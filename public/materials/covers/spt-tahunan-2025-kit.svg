<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SPT Tahunan 2025 Kit</title>
  <desc id="desc">Cover workbook toolkit pelaporan SPT Tahunan</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F4A" />
      <stop offset="100%" stop-color="#0E7490" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <circle cx="1130" cy="80" r="260" fill="#38BDF8" fill-opacity="0.18" />
  <circle cx="120" cy="640" r="230" fill="#22D3EE" fill-opacity="0.12" />

  <g transform="translate(90,76)">
    <rect x="0" y="0" width="1020" height="523" rx="30" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.22" />

    <rect x="62" y="80" width="136" height="136" rx="24" fill="#10B981" fill-opacity="0.24" />
    <rect x="98" y="113" width="64" height="89" rx="8" fill="#FFFFFF" fill-opacity="0.95" />
    <rect x="106" y="123" width="48" height="8" rx="4" fill="#059669" />
    <rect x="106" y="138" width="48" height="8" rx="4" fill="#34D399" />
    <rect x="106" y="153" width="48" height="8" rx="4" fill="#6EE7B7" />
    <rect x="106" y="168" width="48" height="8" rx="4" fill="#A7F3D0" />

    <text x="240" y="128" fill="#E0F2FE" font-size="32" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="600">
      Workbook Pendamping
    </text>
    <text x="240" y="183" fill="#FFFFFF" font-size="58" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="800">
      SPT Tahunan 2025 Kit
    </text>

    <g transform="translate(62,278)">
      <rect x="0" y="0" width="896" height="164" rx="20" fill="#FFFFFF" fill-opacity="0.08" />
      <text x="30" y="50" fill="#E2E8F0" font-size="30" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="600">
