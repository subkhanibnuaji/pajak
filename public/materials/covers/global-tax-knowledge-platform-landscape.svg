<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Decorative Circles -->
  <circle cx="350" cy="50" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="50" cy="250" r="60" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Globe Icon -->
  <g transform="translate(200, 120)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="20" ry="50" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>
  
  <!-- Connected Dots (Network) -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="120" cy="80" r="4"/>
    <circle cx="280" cy="80" r="4"/>
    <circle cx="100" cy="160" r="4"/>
    <circle cx="300" cy="160" r="4"/>
    <circle cx="150" cy="200" r="4"/>
    <circle cx="250" cy="200" r="4"/>
  </g>
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <line x1="120" y1="80" x2="200" y2="120"/>
    <line x1="280" y1="80" x2="200" y2="120"/>
    <line x1="100" y1="160" x2="200" y2="120"/>
    <line x1="300" y1="160" x2="200" y2="120"/>
    <line x1="150" y1="200" x2="200" y2="120"/>
    <line x1="250" y1="200" x2="200" y2="120"/>
  </g>
  
  <!-- Title Area -->
  <text x="200" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="white">
    Global Tax Knowledge
  </text>
  <text x="200" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">
    Platform Landscape
  </text>
  
  <!-- Score Badge -->
  <rect x="160" y="265" width="80" height="22" rx="11" fill="url(#accentGradient)"/>
  <text x="200" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">
    30+ Platforms
  </text>
</svg>